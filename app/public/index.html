<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InvoiceFlow — Sign in</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header><span class="brand">InvoiceFlow</span></header>
  <main style="max-width:400px;">
    <div class="card">
      <h1>Sign in</h1>
      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" data-testid="login-email" value="demo@invoiceflow.test" />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" data-testid="login-password" value="Demo1234!" />
        <button type="submit" data-testid="login-submit">Sign in</button>
        <div class="error" id="login-error" data-testid="login-error"></div>
      </form>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
